name: node

on: push

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Start postgres
        run: docker compose up -d --renew-anon-volumes
      - name: Wait for databases to be ready
        run: |
          for port in 5432 5433 5434; do
            echo "Waiting for postgres on port $port..."
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p $port -q 2>/dev/null; then
                echo "Postgres on port $port is ready"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Timed out waiting for postgres on port $port"
                docker compose logs
                exit 1
              fi
              sleep 2
            done
          done
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: npm
      - name: install
        run: npm install
      - name: build
        run: npm run build
      - name: linter
        run: npm run lint
        if: ${{ always() }}
      - name: test
        run: npm run test
      - name: integration test
        run: npm run test:integration
      - name: Report coverage
        uses: coverallsapp/github-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false
